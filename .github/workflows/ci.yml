name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-package: jdk+fx
          java-version: '25'
          cache: gradle

      - name: Verify Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run tests
        shell: pwsh
        run: .\gradlew.bat --no-daemon test

      - name: Build application
        shell: pwsh
        run: .\gradlew.bat --no-daemon build

      - name: Stage modern runtime
        shell: pwsh
        run: .\gradlew.bat --no-daemon stageModernRuntime modernDistZip

      - name: Upload modern runtime zip
        uses: actions/upload-artifact@v4
        with:
          name: shootoff-modern-runtime
          path: build/dist/*.zip
