def configureLegacyAntFx = {
    if (!hasLegacyJavafxAnt) {
        throw new GradleException("Legacy JavaFX Ant tasks require ant-javafx.jar from a Java 8 JDK.")
    }

    ant.taskdef(
        resource: 'com/sun/javafx/tools/ant/antlib.xml',
        uri: 'javafx:com.sun.javafx.tools.ant',
        classpath: configurations.jfxant.asPath)
}

def deleteDirectoryWithRetries = { File targetDir, int maxAttempts = 5, long delayMs = 1000L ->
    if (!targetDir.exists()) {
        return
    }

    Exception lastFailure = null

    for (int attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
            project.delete(targetDir)
            if (!targetDir.exists()) {
                return
            }
        } catch (Exception ex) {
            lastFailure = ex
        }

        if (attempt < maxAttempts) {
            logger.lifecycle("Retrying cleanup of ${targetDir} (${attempt}/${maxAttempts})...")
            Thread.sleep(delayMs)
        }
    }

    throw new GradleException(
        "Unable to clean staged runtime at ${targetDir}. Close any running ShootOFF windows and try again.",
        lastFailure
    )
}

def runExternalCommand = { List<String> command, File workingDir ->
    def normalizedCommand = command.collect { it.toString() }
    logger.lifecycle("Running external command: ${normalizedCommand.join(' ')}")

    def processBuilder = new ProcessBuilder(normalizedCommand)
        .directory(workingDir)
        .redirectErrorStream(true)

    if (!localToolPathEntries.isEmpty()) {
        def environment = processBuilder.environment()
        def existingPath = environment.get('PATH') ?: ''
        environment.put('PATH', localToolPathEntries.join(File.pathSeparator) + File.pathSeparator + existingPath)
    }

    def process = processBuilder.start()

    def commandOutput = new StringBuilder()
    process.inputStream.eachLine { line ->
        logger.lifecycle(line)
        commandOutput.append(line).append(System.lineSeparator())
    }

    int exitCode = process.waitFor()
    if (exitCode != 0) {
        throw new GradleException("External command failed with exit code ${exitCode}:${System.lineSeparator()}${commandOutput}")
    }
}

