        if (!jpackageAppImageDir.exists()) {
            throw new GradleException("Expected app image at ${jpackageAppImageDir}, but it was not found.")
        }

        deleteDirectoryWithRetries(installerOutputDir)
        deleteDirectoryWithRetries(jpackageTempDir)
        installerOutputDir.mkdirs()
