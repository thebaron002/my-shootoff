tasks.register('modernAppImage') {
    dependsOn('stageJpackageInput')
    description = 'Create a Windows app image for ShootOFF using jpackage'
    group = 'Package'

    doLast {
        if (!jpackageExecutable.exists()) {
            throw new GradleException("jpackage.exe was not found at ${jpackageExecutable}.")
        }

        if (!javafxJmodsDir.isDirectory()) {
            throw new GradleException("JavaFX jmods directory was not found at ${javafxJmodsDir}.")
        }

        deleteDirectoryWithRetries(jpackageAppImageOutputDir)
        deleteDirectoryWithRetries(jpackageTempDir)
        jpackageAppImageOutputDir.mkdirs()
        jpackageTempDir.mkdirs()

        runExternalCommand([
            jpackageExecutable.absolutePath,
            '--type', 'app-image',
            '--dest', jpackageAppImageOutputDir.absolutePath,
            '--temp', jpackageTempDir.absolutePath,
            '--input', jpackageInputDir.absolutePath,
            '--name', 'ShootOFF',
            '--app-version', installerVersion,
            '--vendor', appVendor,
            '--description', appDescription,
            '--copyright', 'ShootOFF contributors',
            '--icon', windowsIconFile.absolutePath,
            '--main-jar', 'ShootOFF.jar',
            '--main-class', mainClassName,
            '--module-path', javafxJmodsDir.absolutePath,
            '--add-modules', jpackageRuntimeModules.join(','),
            '--java-options', "--add-modules=${jpackageRuntimeModules.join(',')}",
            '--java-options', '--enable-native-access=ALL-UNNAMED',
            '--java-options', '--enable-native-access=javafx.graphics',
            '--java-options', "-Dshootoff.home=${appHomePlaceholder}",
            '--java-options', "-Djava.library.path=${appHomePlaceholder};${appHomePlaceholder}\\native\\opencv",
            '--java-options', "-Duser.dir=${appHomePlaceholder}",
            '--verbose'
        ], project.projectDir)
    }
}

tasks.register('modernMsi') {
    dependsOn('modernAppImage')
    description = 'Create a Windows MSI installer for the modern ShootOFF runtime'
    group = 'Package'

    doLast {
        if (!jpackageExecutable.exists()) {
            throw new GradleException("jpackage.exe was not found at ${jpackageExecutable}.")
